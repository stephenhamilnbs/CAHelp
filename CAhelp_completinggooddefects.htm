<p>To edit a Completion of Making Good Defects form, select a check box by 
clicking on
<img border="0" src="images/cahelp_checkbox.gif" width="13" height="11"> with 
your mouse.</p>
<p>Once a section has been selected, you will be able to choose details from a 
drop-down list.</p>
<p>To complete the <b>was in my/our opinion completed on </b>field, click on the box 
and a calendar will open.</p>
<p>
<img border="1" src="images/cahelp_images_calendar.gif"></p>
<p>Click on the correct date (using the arrows to select a different month) and 
then close by clicking on the <b>X</b>.</p>

<h3>Editing the Distribution List</h3>

<p>The <strong>Form Distribution list</strong> may also need editing, which can be accessed by clicking on the <strong>Distribution 
List tab</strong>. The user can select/deselect team members for inclusion on the form 
<a href="CAhelp_Transmittalsheets.htm">Transmittal Sheet</a> by clicking on the checkbox in the send column. 
For more information on how to edit this, see <a href="CAhelp_formDistributionLists.htm">Form Distribution List</a>.</p>

<p>Each form in the active job has an associated Form Distribution list. Each of these are 
populated from the <strong>Global Distribution lists</strong>. For more information on this, see <a href="CAhelp_globaldistributionlists.htm">
Global Distribution List</a>. <em>Please Note: Changes made in the Global Distribution lists will be reflected 
in the Form Distribution lists of any subsequently added forms.</em></p>
